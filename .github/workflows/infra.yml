name: Infrastructure

# Run manually, or automatically when infra/ files change on main.
# NOTE: AWS Academy credentials expire per session — update the three
# AWS_* secrets in GitHub before triggering this workflow.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'infra/**'

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.9'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Write tfvars from secret
        working-directory: infra
        run: echo 'groq_api_key = "${{ secrets.GROQ_API_KEY }}"' > terraform.tfvars

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve tfplan
